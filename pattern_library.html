<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Library — Day Trader OS</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #080a0f;
    --panel: #0e1118;
    --border: #1c2130;
    --neon: #7fff00;
    --neon2: #ff00aa;
    --neon3: #00aaff;
    --warn: #ffaa00;
    --text: #c8d0df;
    --muted: #4a5568;
    --bull: #00e676;
    --bear: #ff3d71;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 20% 20%, rgba(127,255,0,0.04) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 80%, rgba(0,170,255,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; padding: 30px; max-width: 1400px; margin: 0 auto; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 40px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }

  .hd-title {
    font-size: 3em;
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    color: #fff;
  }

  .hd-title em {
    font-style: normal;
    color: var(--neon);
  }

  .hd-sub {
    font-family: 'Syne Mono', monospace;
    font-size: 0.75em;
    color: var(--muted);
    letter-spacing: 2px;
    margin-top: 8px;
  }

  /* Category tabs */
  .tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 35px;
    flex-wrap: wrap;
  }

  .tab {
    padding: 10px 20px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    border-radius: 4px;
    font-family: 'Syne Mono', monospace;
    font-size: 0.75em;
    text-transform: uppercase;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active, .tab:hover {
    background: var(--neon);
    color: #080a0f;
    border-color: var(--neon);
    font-weight: 700;
  }

  /* Pattern grid */
  .pattern-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .pattern-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: all 0.3s;
    cursor: pointer;
  }

  .pattern-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }

  .pattern-card.bull { border-top: 3px solid var(--bull); }
  .pattern-card.bear { border-top: 3px solid var(--bear); }
  .pattern-card.neutral { border-top: 3px solid var(--warn); }

  .pattern-card:hover.bull { border-color: var(--bull); }
  .pattern-card:hover.bear { border-color: var(--bear); }

  .chart-area {
    background: #06080c;
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
  }

  .pattern-info {
    padding: 18px;
  }

  .pattern-name {
    font-size: 1.1em;
    font-weight: 700;
    color: #fff;
    margin-bottom: 6px;
  }

  .pattern-signal {
    font-family: 'Syne Mono', monospace;
    font-size: 0.7em;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .sig-bull { color: var(--bull); }
  .sig-bear { color: var(--bear); }
  .sig-neutral { color: var(--warn); }

  .pattern-desc {
    font-size: 0.82em;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .pattern-rules {
    border-top: 1px solid var(--border);
    padding-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .rule {
    font-family: 'Syne Mono', monospace;
    font-size: 0.72em;
    color: var(--text);
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }

  .rule .icon { flex-shrink: 0; }

  .reliability {
    display: flex;
    gap: 4px;
    margin-top: 10px;
    align-items: center;
  }

  .rel-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--border);
  }

  .rel-dot.filled { background: var(--neon); }

  .rel-label {
    font-family: 'Syne Mono', monospace;
    font-size: 0.65em;
    color: var(--muted);
    margin-left: 6px;
  }

  /* SVG candle helpers */
  .bull-candle { fill: var(--bull); stroke: var(--bull); }
  .bear-candle { fill: var(--bear); stroke: var(--bear); }
  .neutral-candle { fill: #888; stroke: #888; }
  .wick { stroke-width: 1.5; }

  /* Chart patterns section */
  .chart-patterns {
    margin-top: 20px;
  }

  .section-title {
    font-family: 'Syne Mono', monospace;
    font-size: 0.75em;
    color: var(--neon);
    text-transform: uppercase;
    letter-spacing: 4px;
    margin-bottom: 20px;
    display: flex;
    align-items: center;
    gap: 15px;
  }

  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .chart-pattern-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }

  .cp-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 22px;
    transition: all 0.3s;
  }

  .cp-card:hover {
    border-color: var(--neon3);
    box-shadow: 0 0 20px rgba(0,170,255,0.1);
  }

  .cp-name {
    font-size: 1.2em;
    font-weight: 700;
    color: #fff;
    margin-bottom: 8px;
  }

  .cp-type {
    font-family: 'Syne Mono', monospace;
    font-size: 0.68em;
    color: var(--neon3);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .cp-svg {
    background: #06080c;
    border-radius: 6px;
    padding: 10px;
    margin-bottom: 14px;
  }

  .cp-desc {
    font-size: 0.83em;
    color: var(--muted);
    line-height: 1.6;
    margin-bottom: 12px;
  }

  .how-to-trade {
    background: rgba(127,255,0,0.05);
    border: 1px solid rgba(127,255,0,0.15);
    border-radius: 6px;
    padding: 12px;
    font-family: 'Syne Mono', monospace;
    font-size: 0.72em;
    line-height: 1.7;
    color: var(--text);
  }

  .how-to-trade strong { color: var(--neon); }
</style>

function renderCandlePatterns(filter) {
  const grid = document.getElementById('patternGrid');
  const filtered = filter === 'all' ? candlePatterns : candlePatterns.filter(p => p.cat === filter);
  grid.innerHTML = filtered.map(p => `
    <div class="pattern-card ${p.cat}">
      <div class="chart-area">${p.svg}</div>
      <div class="pattern-info">
        <div class="pattern-name">${p.name}</div>
        <div class="pattern-signal sig-${p.signal}">
          ${p.signal === 'bull' ? '▲' : p.signal === 'bear' ? '▼' : '●'} ${p.signal.toUpperCase()} SIGNAL
        </div>
        <div class="reliability">
          ${[1,2,3,4,5].map(i => `<div class="rel-dot ${i <= p.reliability ? 'filled' : ''}"></div>`).join('')}
          <span class="rel-label">Reliability ${p.reliability}/5</span>
        </div>
        <div class="pattern-desc">${p.desc}</div>
        <div class="pattern-rules">
          ${p.rules.map(r => `<div class="rule"><span class="icon">${r[0]}</span><span>${r.slice(1)}</span></div>`).join('')}
        </div>
      </div>
    </div>
  `).join('');
}

function renderChartPatterns() {
  const grid = document.getElementById('chartGrid');
  grid.innerHTML = chartPatterns.map(p => `
    <div class="cp-card">
      <div class="cp-name">${p.name}</div>
      <div class="cp-type">${p.type}</div>
      <div class="cp-svg">${p.svg}</div>
      <div class="cp-desc">${p.desc}</div>
      <div class="how-to-trade">${p.how.split('\n').map(l => `${l}<br>`).join('')}</div>
    </div>
  `).join('');
}

function showCat(cat, btn) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const candles = document.getElementById('cat-candles');
  const charts = document.getElementById('cat-chart');

  if (cat === 'chart') {
    candles.style.display = 'none';
    charts.style.display = 'block';
    renderChartPatterns();
  } else {
    candles.style.display = 'block';
    charts.style.display = 'none';
    renderCandlePatterns(cat === 'all' ? 'all' : cat === 'neutral' ? 'neutral' : cat === 'bull' ? 'bull' : 'bear');
  }
}

renderCandlePatterns('all');
</script>
