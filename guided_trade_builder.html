<body class="app-shell page-redirect" data-dto-shell="modern" data-page-id="redirect">

</section>

    
  </main>

<script src="assets/scripts/redirect.js" defer></script>
  <dialog id="globalModal" class="site-dialog">
    <div class="dialog-body">
      <div class="dialog-header">
        <h2 id="globalModalTitle" class="h3"></h2>
        <button class="dialog-close" id="globalModalClose" aria-label="Close">&#215;</button>
      </div>
      <div id="globalModalBody"></div>
    </div>
  </dialog>
  <div id="toastStack" class="toast-stack"></div>

  <button id="aiChatFab" class="ai-chat-fab" aria-label="Ask AI assistant" aria-expanded="false" title="Ask AI">

        <span class="ai-chat-title">AI Assistant</span>
        <span id="aiChatProvider" class="mini-chip hold" style="font-size:11px">Ready</span>
      </div>
      <div class="ai-chat-header-right">
        <button class="ghost-btn" id="aiChatClear" title="Clear chat" style="font-size:12px;padding:4px 8px">Clear</button>
        <button class="dialog-close" id="aiChatClose" aria-label="Close">&#215;</button>
      </div>
    </div>
    <div id="aiChatMessages" class="ai-chat-messages"></div>
    <form id="aiChatForm" class="ai-chat-input-row">
      <input id="aiChatInput" class="ai-chat-input" type="text"
        placeholder="Ask about setups, risk, entries…" autocomplete="off" maxlength="500">
      <button type="submit" class="primary-btn ai-chat-send">Send</button>
    </form>
  </aside>
