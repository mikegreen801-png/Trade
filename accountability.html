<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Accountability - Day Trader OS</title><link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/daytrader-os.css?v=20260504-vercel1"><style>*{box-sizing:border-box}body{margin:0;background:#05070c;color:#d8e2ef;font-family:JetBrains Mono,monospace;padding:86px 28px 110px}main{max-width:1060px;margin:auto}.kicker{color:#00d7ff;font-size:12px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}h1{font-family:Barlow Condensed,sans-serif;font-size:clamp(52px,9vw,112px);line-height:.85;margin:10px 0 24px;color:#fff;text-transform:uppercase}.panel{border:1px solid #223047;border-radius:10px;background:#0c111a;padding:22px;margin-top:18px}.account-form{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.field{display:flex;flex-direction:column;gap:8px}.field label{color:#8190a8;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}.field input,.field select{width:100%;min-height:48px;border:1px solid rgba(127,141,163,.3);border-radius:7px;background:#070c14;color:#f4f8ff;font:600 14px/1.4 JetBrains Mono,monospace;padding:12px;outline:none}.checks{display:grid;gap:10px;margin-top:16px}.checks label{display:flex;gap:10px;align-items:flex-start;border:1px solid #223047;border-radius:8px;padding:12px;background:#080d15;color:#cbd8e9;font-size:13px;line-height:1.45}.checks input{margin-top:3px}.primary{margin-top:16px;min-height:48px;border:0;border-radius:7px;background:#00e08a;color:#03110a;cursor:pointer;font:900 12px/1 JetBrains Mono,monospace;letter-spacing:.08em;padding:12px 18px;text-transform:uppercase}@media(max-width:850px){.account-form{grid-template-columns:1fr}body{padding-inline:16px}}</style></head><body><a class="dto-home-link" href="index.html"><span class="dto-home-mark" aria-hidden="true">&larr;</span><span>Return Home</span></a><main><div class="kicker">Discipline / Max Loss / Mindset</div><h1>Accountability</h1><section class="panel"><form id="accountabilityForm"><div class="account-form"><div class="field"><label for="maxLoss">Daily Max Loss</label><input id="maxLoss" type="number" value="300"></div><div class="field"><label for="emotion">Emotion</label><select id="emotion"><option>Calm</option><option>Focused</option><option>FOMO</option><option>Tired</option><option>Revenge-risk</option></select></div><div class="field"><label for="mode">Trade Mode</label><select id="mode"><option>Beginner guided</option><option>Pro</option><option>Expert</option></select></div><div class="field"><label for="sizeMode">Size Today</label><select id="sizeMode"><option>Normal</option><option>Half size</option><option>Paper only</option></select></div></div><div class="checks"><label><input type="checkbox"> I know the market context before taking trades.</label><label><input type="checkbox"> I will not trade without entry, stop, target, and max loss.</label><label><input type="checkbox"> I will stop after breaking my rules twice.</label><label><input type="checkbox"> I will journal every trade today.</label></div><button class="primary">Save Daily Rules</button></form></section><section class="panel" id="savedBox"></section></main><script src="assets/daytrader-os.js?v=20260504-vercel1"></script><script>
function render(){const p=DTO.readJson("dtoAccountability",null);savedBox.innerHTML=p?`<div class="dto-panel-kicker">Today Saved</div><div class="dto-list-row"><strong>Max loss ${DTO.money(p.maxLoss)}</strong><span>${DTO.escapeHtml(p.emotion)} / ${DTO.escapeHtml(p.sizeMode)}</span></div><p>${p.sizeMode==="Paper only"||p.emotion==="Revenge-risk"?"Good call: keep it paper-only until your head is clear.":"Rules saved. Respect the stop before chasing another setup."}</p>`:"<p>No daily rules saved yet.</p>";}
accountabilityForm.addEventListener("submit",e=>{e.preventDefault();DTO.writeJson("dtoAccountability",{maxLoss:Number(maxLoss.value),emotion:emotion.value,mode:mode.value,sizeMode:sizeMode.value,date:new Date().toISOString()});render();});render();
</script></body></html>
