<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Options Hedge Builder - Day Trader OS</title><link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/daytrader-os.css?v=20260504-vercel1"><style>*{box-sizing:border-box}body{margin:0;background:#05070c;color:#d8e2ef;font-family:JetBrains Mono,monospace;padding:86px 28px 110px}main{max-width:1080px;margin:auto}.kicker{color:#00d7ff;font-size:12px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}h1{font-family:Barlow Condensed,sans-serif;font-size:clamp(52px,9vw,112px);line-height:.85;margin:10px 0 24px;color:#fff;text-transform:uppercase}.panel{border:1px solid #223047;border-radius:10px;background:#0c111a;padding:22px;margin-top:18px}.hedge-form{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.field{display:flex;flex-direction:column;gap:8px}.field label{color:#8190a8;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}.field input,.field select{width:100%;min-height:48px;border:1px solid rgba(127,141,163,.3);border-radius:7px;background:#070c14;color:#f4f8ff;font:600 14px/1.4 JetBrains Mono,monospace;padding:12px;outline:none}.primary{grid-column:1/-1;min-height:48px;border:0;border-radius:7px;background:#00e08a;color:#03110a;cursor:pointer;font:900 12px/1 JetBrains Mono,monospace;letter-spacing:.08em;padding:12px;text-transform:uppercase}.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:18px}@media(max-width:900px){.cards,.hedge-form{grid-template-columns:1fr}body{padding-inline:16px}}</style></head><body><a class="dto-home-link" href="index.html"><span class="dto-home-mark" aria-hidden="true">&larr;</span><span>Return Home</span></a><main><div class="kicker">Protective Puts / Calls / Debit / Credit Spreads</div><h1>Options Hedge</h1><section class="panel"><form class="hedge-form" id="hedgeForm"><div class="field"><label for="symbol">Symbol</label><input id="symbol"></div><div class="field"><label for="strategy">Strategy</label><select id="strategy"><option value="debit">Debit Spread</option><option value="credit">Credit Spread</option><option value="protective">Protective Put/Call</option></select></div><div class="field"><label for="underlying">Underlying</label><input id="underlying" type="number" step="0.01"></div><div class="field"><label for="contracts">Contracts</label><input id="contracts" type="number" value="1"></div><div class="field"><label for="longStrike">Long Strike</label><input id="longStrike" type="number" step="0.01"></div><div class="field"><label for="shortStrike">Short Strike</label><input id="shortStrike" type="number" step="0.01"></div><div class="field"><label for="longAsk">Long Ask</label><input id="longAsk" type="number" step="0.01"></div><div class="field"><label for="shortBid">Short Bid</label><input id="shortBid" type="number" step="0.01"></div><button class="primary">Preview Hedge</button></form><div class="cards" id="result"></div></section></main><script src="assets/daytrader-os.js?v=20260504-vercel1"></script><script>
function calc(){const c=Math.max(1,Number(contracts.value||1)), ls=Number(longStrike.value), ss=Number(shortStrike.value), ask=Number(longAsk.value), bid=Number(shortBid.value), width=Math.abs(ss-ls), isCredit=strategy.value==="credit", isProt=strategy.value==="protective";const net=isCredit?Math.max(0,bid-ask):ask;const maxLoss=isProt?ask*100*c:isCredit?Math.max(0,(width-(bid-ask))*100*c):net*100*c;const maxProfit=isProt?Infinity:isCredit?Math.max(0,(bid-ask)*100*c):Math.max(0,(width-net)*100*c);const breakeven=Number(underlying.value||0)+(strategy.value==="credit"?bid-ask:net);const spread=Math.abs(ask-bid);result.innerHTML=[["Net",DTO.money(net*100*c)],["Max Loss",DTO.money(maxLoss)],["Max Profit",Number.isFinite(maxProfit)?DTO.money(maxProfit):"Open-ended"],["Bid/Ask Width",DTO.money(spread)]].map(x=>`<div class="dto-mission-panel"><div class="dto-panel-kicker">${x[0]}</div><h3>${x[1]}</h3></div>`).join("")+`<div class="dto-warning dto-span-4">Breakeven estimate ${DTO.money(breakeven)}. ${spread>.35?"Wide spread: use limit orders and avoid thin contracts.":"Liquidity width is reasonable for planning."} Live execution remains locked.</div>`;}
hedgeForm.addEventListener("submit",e=>{e.preventDefault();calc();});const s=DTO.getSetup();if(s){symbol.value=s.symbol||"";underlying.value=s.entry||"";}calc();
</script></body></html>
