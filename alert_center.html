<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Alert Center - Day Trader OS</title><link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/daytrader-os.css?v=20260504-vercel1"><style>*{box-sizing:border-box}body{margin:0;background:#05070c;color:#d8e2ef;font-family:JetBrains Mono,monospace;padding:86px 28px 110px}main{max-width:1060px;margin:auto}.kicker{color:#00d7ff;font-size:12px;font-weight:800;letter-spacing:.18em;text-transform:uppercase}h1{font-family:Barlow Condensed,sans-serif;font-size:clamp(52px,9vw,112px);line-height:.85;margin:10px 0 24px;color:#fff;text-transform:uppercase}.panel{border:1px solid #223047;border-radius:10px;background:#0c111a;padding:22px;margin-top:18px}.alert-form{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}.field{display:flex;flex-direction:column;gap:8px}.field.full{grid-column:1/-1}.field label{color:#8190a8;font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase}.field input,.field select{width:100%;min-height:48px;border:1px solid rgba(127,141,163,.3);border-radius:7px;background:#070c14;color:#f4f8ff;font:600 14px/1.4 JetBrains Mono,monospace;padding:12px;outline:none}.field input:focus,.field select:focus{border-color:#00d7ff;box-shadow:0 0 0 3px rgba(0,215,255,.09)}.primary{grid-column:1/-1;min-height:48px;border:0;border-radius:7px;background:#00e08a;color:#03110a;cursor:pointer;font:900 12px/1 JetBrains Mono,monospace;letter-spacing:.08em;padding:12px;text-transform:uppercase}@media(max-width:850px){.alert-form{grid-template-columns:1fr}body{padding-inline:16px}}</style></head><body><a class="dto-home-link" href="index.html"><span class="dto-home-mark" aria-hidden="true">&larr;</span><span>Return Home</span></a><main><div class="kicker">Local Alert Plans</div><h1>Alert Center</h1><section class="panel"><form class="alert-form" id="alertForm"><div class="field"><label for="symbol">Symbol</label><input id="symbol"></div><div class="field"><label for="trigger">Trigger</label><select id="trigger"><option>Price near support</option><option>Price near resistance</option><option>R:R becomes valid</option><option>Watchlist volume spike</option></select></div><div class="field"><label for="level">Level</label><input id="level" type="number" step="0.0001"></div><div class="field"><label for="priority">Priority</label><select id="priority"><option>High</option><option>Medium</option><option>Low</option></select></div><div class="field full"><label for="note">Action Note</label><input id="note" placeholder="What should I check when this fires?"></div><button class="primary">Save Alert Plan</button></form></section><section class="panel" id="alertList"></section></main><script src="assets/daytrader-os.js?v=20260504-vercel1"></script><script>
function alerts(){return DTO.readJson("dtoAlertPlans",[])}
function render(){document.getElementById("alertList").innerHTML=`<div class="dto-panel-kicker">Saved Alerts</div>${alerts().map(a=>`<div class="dto-list-row"><strong>${DTO.escapeHtml(a.symbol)} @ ${DTO.escapeHtml(a.level)}</strong><span>${DTO.escapeHtml(a.trigger)} / ${DTO.escapeHtml(a.priority)}</span></div>`).join("")||"<p>No alert plans saved yet. These are local planning alerts, not broker/server notifications.</p>"}`;}
document.getElementById("alertForm").addEventListener("submit",e=>{e.preventDefault();const a={symbol:document.getElementById("symbol").value.toUpperCase(),trigger:document.getElementById("trigger").value,level:document.getElementById("level").value,priority:document.getElementById("priority").value,note:document.getElementById("note").value,createdAt:new Date().toISOString()};DTO.writeJson("dtoAlertPlans",[a,...alerts()].slice(0,50));render();});render();
</script></body></html>
